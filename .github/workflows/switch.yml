name: Build Switch CN NRO

on:
  push:
  workflow_dispatch:

jobs:
  build-switch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install devkitPro APT Repository & Packages
        run: |
          sudo apt-get update
          sudo apt-get install -y curl gpg libgl1-mesa-dev libglu1-mesa-dev
          sudo mkdir -p /etc/apt/keyrings
          curl -L -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64)" https://apt.devkitpro.org/devkitpro-keyring.gpg | sudo gpg --dearmor -o /etc/apt/keyrings/devkitpro.gpg
          echo "deb [signed-by=/etc/apt/keyrings/devkitpro.gpg] https://apt.devkitpro.org/stable devkitpro main" | sudo tee /etc/apt/sources.list.d/devkitpro.list
          sudo apt-get update
          sudo apt-get install -y devkitpro-pacman
          export PATH=/opt/devkitpro/pacman/bin:$PATH
          sudo /opt/devkitpro/pacman/bin/dkp-pacman -Syu --noconfirm
          sudo /opt/devkitpro/pacman/bin/dkp-pacman -S --noconfirm switch-dev switch-sdl2 switch-glad switch-libpng switch-freetype switch-zlib switch-bzip2 switch-curl switch-libzip
      - name: Build Switch NRO
        run: |
          export DEVKITPRO=/opt/devkitpro
          export PATH=$DEVKITPRO/pacman/bin:$PATH
          $DEVKITPRO/portlibs/switch/bin/dkp-cmake -B build-switch -DSWITCH=ON -DCMAKE_BUILD_TYPE=Release
          cmake --build build-switch --target soh.nro -j$(nproc)
      - name: Upload Switch NRO Artifact
        uses: actions/upload-artifact@v4
        with:
          name: soh-switch-cn
          path: build-switch/soh.nro
