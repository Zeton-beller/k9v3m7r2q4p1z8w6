name: Build Switch CN NRO

on:
  push:
  workflow_dispatch:

jobs:
  build-switch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install devkitPro & Dependencies
        run: |
          sudo mkdir -p /opt/devkitpro/pacman/etc/pacman.d
          echo "deb [trusted=yes] https://apt.devkitpro.org/ stable main" | sudo tee /etc/apt/sources.list.d/devkitpro.list
          sudo apt-get update
          sudo apt-get install -y devkitpro-pacman || true
          sudo sed -i 's/SigLevel.*/SigLevel = Never/g' /opt/devkitpro/pacman/etc/pacman.conf
          sudo bash -c 'grep -q "XferCommand" /opt/devkitpro/pacman/etc/pacman.conf || echo "XferCommand = /usr/bin/curl -L -A \"Mozilla/5.0\" %u -o %o" >> /opt/devkitpro/pacman/etc/pacman.conf'
          sudo dpkg --configure -a || true
          sudo dkp-pacman -Sy --noconfirm
          sudo dkp-pacman -S --noconfirm \
            switch-dev switch-sdl2 switch-glad switch-libpng switch-freetype \
            switch-zlib switch-bzip2 switch-curl switch-libopus switch-opusfile \
            switch-libvorbis switch-libogg

      - name: Build and Install Custom Switch Libraries
        run: |
          source /etc/profile.d/devkit-env.sh
          export DEVKITPRO=/opt/devkitpro

          git clone --depth 1 https://github.com/nih-at/libzip.git /tmp/libzip
          cmake -B /tmp/libzip/build -S /tmp/libzip \
            -DCMAKE_TOOLCHAIN_FILE=$DEVKITPRO/cmake/Switch.cmake \
            -DCMAKE_INSTALL_PREFIX=$DEVKITPRO/portlibs/switch \
            -DBUILD_SHARED_LIBS=OFF -DBUILD_OSSFUZZ=OFF \
            -DENABLE_COMMONCRYPTO=OFF -DENABLE_GNUTLS=OFF \
            -DENABLE_MBEDTLS=OFF -DENABLE_OPENSSL=OFF \
            -DENABLE_WINDOWS_CRYPTO=OFF -DBUILD_TOOLS=OFF \
            -DBUILD_REGRESS=OFF -DBUILD_EXAMPLES=OFF -DBUILD_DOC=OFF
          sudo -E cmake --build /tmp/libzip/build --target install -j$(nproc)

          git clone --depth 1 https://github.com/leethomason/tinyxml2.git /tmp/tinyxml2
          cmake -B /tmp/tinyxml2/build -S /tmp/tinyxml2 \
            -DCMAKE_TOOLCHAIN_FILE=$DEVKITPRO/cmake/Switch.cmake \
            -DCMAKE_INSTALL_PREFIX=$DEVKITPRO/portlibs/switch \
            -DBUILD_SHARED_LIBS=OFF -DBUILD_TESTS=OFF
          sudo -E cmake --build /tmp/tinyxml2/build --target install -j$(nproc)

          git clone --depth 1 https://github.com/nlohmann/json.git /tmp/json
          cmake -B /tmp/json/build -S /tmp/json \
            -DCMAKE_INSTALL_PREFIX=$DEVKITPRO/portlibs/switch \
            -DJSON_BuildTests=OFF
          sudo -E cmake --build /tmp/json/build --target install

          git clone --depth 1 https://github.com/gabime/spdlog.git /tmp/spdlog
          cmake -B /tmp/spdlog/build -S /tmp/spdlog \
            -DCMAKE_INSTALL_PREFIX=$DEVKITPRO/portlibs/switch \
            -DSPDLOG_BUILD_TESTS=OFF -DSPDLOG_BUILD_EXAMPLE=OFF
          sudo -E cmake --build /tmp/spdlog/build --target install

      - name: Configure Switch build
        run: |
          source /etc/profile.d/devkit-env.sh
          export DEVKITPRO=/opt/devkitpro

          cat > /tmp/switch-init.cmake << 'CMAKEINIT'
          set(CMAKE_LINK_LIBRARY_USING_WHOLE_ARCHIVE "LINKER:--whole-archive" "<LINK_ITEM>" "LINKER:--no-whole-archive" CACHE STRING "" FORCE)
          set(CMAKE_LINK_LIBRARY_USING_WHOLE_ARCHIVE_SUPPORTED TRUE CACHE BOOL "" FORCE)
          CMAKEINIT

          cmake -B build-switch \
            -C /tmp/switch-init.cmake \
            -DCMAKE_TOOLCHAIN_FILE=$DEVKITPRO/cmake/Switch.cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_FLAGS="-DIMGUI_IMPL_OPENGL_LOADER_CUSTOM -D__SWITCH__"

      - name: Patch FetchContent dependencies for Switch
        run: |
          # Patch StormLib: ftruncate not available on Switch
          find build-switch/_deps -name "StormPort.h" | while read f; do
            sed -i 's|#define ftruncate64 ftruncate|#ifdef __SWITCH__\n#define ftruncate64(fd,sz) (0)\n#else\n#define ftruncate64 ftruncate\n#endif|g' "$f"
            echo "Patched StormPort.h: $f"
          done

          # Patch ImGui opengl3 loader: wrap entire POSIX dynamic linking section
          find build-switch/_deps -name "imgui_impl_opengl3_loader.h" | while read f; do
            python3 - "$f" << 'PYEOF'
import sys, re

with open(sys.argv[1], 'r') as fh:
    content = fh.read()

# Replace the entire loader implementation section for non-Switch
# The loader is guarded by IMGUI_IMPL_OPENGL_LOADER_CUSTOM - when defined, skip it
guard = '#ifdef IMGUI_IMPL_OPENGL_LOADER_CUSTOM\n// Custom loader: skip built-in GL loader\n#else\n'
end_guard = '\n#endif // IMGUI_IMPL_OPENGL_LOADER_CUSTOM\n'

# Find the #include <dlfcn.h> and wrap the whole file body after the initial includes
# Strategy: disable all dlopen/dlsym usage by replacing dlfcn references
content = content.replace('#include <dlfcn.h>', '#ifndef __SWITCH__\n#include <dlfcn.h>\n#else\n// Switch stubs\n#define dlopen(a,b) nullptr\n#define dlclose(a) 0\n#define dlsym(a,b) nullptr\n#define RTLD_LAZY 0\n#define RTLD_LOCAL 0\n#define RTLD_NOLOAD 0\n#define RTLD_GLOBAL 0\n#endif')

with open(sys.argv[1], 'w') as fh:
    fh.write(content)

print(f"Patched: {sys.argv[1]}")
PYEOF
          done

      - name: Build Switch NRO
        run: |
          source /etc/profile.d/devkit-env.sh
          export DEVKITPRO=/opt/devkitpro
          cmake --build build-switch --target soh -j$(nproc) 2>&1 | tee /tmp/build.log || true
          echo "=== ERRORS ==="
          grep "error:" /tmp/build.log | head -40
          test -f build-switch/soh.nro && echo "BUILD SUCCESS!"

      - name: Upload Switch NRO Artifact
        uses: actions/upload-artifact@v4
        with:
          name: soh-switch-cn
          path: build-switch/soh.nro
