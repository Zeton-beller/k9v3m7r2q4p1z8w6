name: Build Switch CN NRO

on:
  push:
    paths-ignore:
      - '**.md'
      - 'BUILD_CHANGELOG.md'
  workflow_dispatch:

jobs:
  build-switch:
    runs-on: ubuntu-latest
    container: devkitpro/devkita64:latest
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install ccache
        run: |
          apt-get update && apt-get install -y ccache

      - name: Cache C++ Build Objects (ccache)
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: ccache-switch-${{ github.sha }}
          restore-keys: |
            ccache-switch-
          save-always: true

      - name: Configure ccache Environment
        run: |
          mkdir -p ~/.cache/ccache
          echo "CCACHE_DIR=~/.cache/ccache" >> $GITHUB_ENV
          echo "CCACHE_MAXSIZE=2G" >> $GITHUB_ENV
          echo "CCACHE_COMPRESS=1" >> $GITHUB_ENV
          echo "PATH=/usr/lib/ccache:$PATH" >> $GITHUB_ENV

      - name: Build and Install Custom Switch Libraries (libzip, tinyxml2, json)
        run: |
          . /etc/profile.d/devkit-env.sh
          export DEVKITPRO=/opt/devkitpro

          # 1. libzip (禁用所有桌面的可选动态依赖)
          git clone --depth 1 https://github.com/nih-at/libzip.git /tmp/libzip
          cmake -B /tmp/libzip/build -S /tmp/libzip \
            -DCMAKE_TOOLCHAIN_FILE=$DEVKITPRO/cmake/Switch.cmake \
            -DCMAKE_INSTALL_PREFIX=$DEVKITPRO/portlibs/switch \
            -DBUILD_SHARED_LIBS=OFF -DBUILD_OSSFUZZ=OFF \
            -DENABLE_COMMONCRYPTO=OFF -DENABLE_GNUTLS=OFF \
            -DENABLE_MBEDTLS=OFF -DENABLE_OPENSSL=OFF \
            -DENABLE_WINDOWS_CRYPTO=OFF -DENABLE_BZIP2=OFF \
            -DENABLE_LZMA=OFF -DBUILD_TOOLS=OFF -DENABLE_ZSTD=OFF \
            -DBUILD_REGRESS=OFF -DBUILD_EXAMPLES=OFF -DBUILD_DOC=OFF
          cmake --build /tmp/libzip/build --target install -j$(nproc)

          # 2. tinyxml2
          git clone --depth 1 https://github.com/leethomason/tinyxml2.git /tmp/tinyxml2
          cmake -B /tmp/tinyxml2/build -S /tmp/tinyxml2 \
            -DCMAKE_TOOLCHAIN_FILE=$DEVKITPRO/cmake/Switch.cmake \
            -DCMAKE_INSTALL_PREFIX=$DEVKITPRO/portlibs/switch \
            -DBUILD_SHARED_LIBS=OFF -DBUILD_TESTS=OFF
          cmake --build /tmp/tinyxml2/build --target install -j$(nproc)

          # 3. nlohmann_json
          git clone --depth 1 https://github.com/nlohmann/json.git /tmp/json
          cmake -B /tmp/json/build -S /tmp/json \
            -DCMAKE_TOOLCHAIN_FILE=$DEVKITPRO/cmake/Switch.cmake \
            -DCMAKE_INSTALL_PREFIX=$DEVKITPRO/portlibs/switch \
            -DJSON_BuildTests=OFF
          cmake --build /tmp/json/build --target install

          # 4. ogg
          git clone --depth 1 https://github.com/xiph/ogg.git /tmp/ogg
          cmake -B /tmp/ogg/build -S /tmp/ogg \
            -DCMAKE_TOOLCHAIN_FILE=$DEVKITPRO/cmake/Switch.cmake \
            -DCMAKE_INSTALL_PREFIX=$DEVKITPRO/portlibs/switch \
            -DBUILD_SHARED_LIBS=OFF -DBUILD_TESTING=OFF
          cmake --build /tmp/ogg/build --target install -j$(nproc)

          # 5. opus
          git clone --depth 1 https://github.com/xiph/opus.git /tmp/opus
          cmake -B /tmp/opus/build -S /tmp/opus \
            -DCMAKE_TOOLCHAIN_FILE=$DEVKITPRO/cmake/Switch.cmake \
            -DCMAKE_INSTALL_PREFIX=$DEVKITPRO/portlibs/switch \
            -DBUILD_SHARED_LIBS=OFF -DOPUS_BUILD_TESTING=OFF -DOPUS_BUILD_PROGRAMS=OFF
          cmake --build /tmp/opus/build --target install -j$(nproc)

          # 6. opusfile
          git clone --depth 1 https://github.com/xiph/opusfile.git /tmp/opusfile
          cmake -B /tmp/opusfile/build -S /tmp/opusfile \
            -DCMAKE_TOOLCHAIN_FILE=$DEVKITPRO/cmake/Switch.cmake \
            -DCMAKE_INSTALL_PREFIX=$DEVKITPRO/portlibs/switch \
            -DBUILD_SHARED_LIBS=OFF -DOP_DISABLE_HTTP=ON -DOP_DISABLE_EXAMPLES=ON -DOP_DISABLE_DOC=ON
          cmake --build /tmp/opusfile/build --target install -j$(nproc)

          # 7. Clone spdlog
          git clone --depth 1 https://github.com/gabime/spdlog.git /tmp/spdlog

      - name: Patch libzip-config.cmake for Direct Static Import
        shell: python
        run: |
          f = "/opt/devkitpro/portlibs/switch/lib/cmake/libzip/libzip-config.cmake"
          c = open(f).read()
          c = c.replace('include("${CMAKE_CURRENT_LIST_DIR}/libzip-targets.cmake")', 'add_library(libzip::zip UNKNOWN IMPORTED GLOBAL)\nset_target_properties(libzip::zip PROPERTIES IMPORTED_LOCATION "/opt/devkitpro/portlibs/switch/lib/libzip.a" INTERFACE_INCLUDE_DIRECTORIES "/opt/devkitpro/portlibs/switch/include")')
          open(f, "w").write(c)

      - name: Patch tinyxml2Config.cmake for ALIAS Mapping
        shell: python
        run: |
          f = "/opt/devkitpro/portlibs/switch/lib/cmake/tinyxml2/tinyxml2Config.cmake"
          c = open(f).read()
          c += "\nif(TARGET tinyxml2 AND NOT TARGET tinyxml2::tinyxml2)\n  add_library(tinyxml2::tinyxml2 ALIAS tinyxml2)\nendif()\nif(NOT TARGET tinyxml2::tinyxml2)\n  add_library(tinyxml2::tinyxml2 UNKNOWN IMPORTED GLOBAL)\n  set_target_properties(tinyxml2::tinyxml2 PROPERTIES IMPORTED_LOCATION \"/opt/devkitpro/portlibs/switch/lib/libtinyxml2.a\" INTERFACE_INCLUDE_DIRECTORIES \"/opt/devkitpro/portlibs/switch/include\")\nendif()\n"
          open(f, "w").write(c)

      - name: Patch spdlog & bundled fmt for Switch
        shell: python
        run: |
          path = "/tmp/spdlog/include/spdlog/details/os-inl.h"
          text = open(path).read()
          text = text.replace("tm.tm_gmtoff", "0")
          text = text.replace("::isatty(fileno(file))", "false")
          text = text.replace("::fsync(fileno(fp))", "0")
          text = text.replace("::fileno(f)", "0")
          open(path, "w").write(text)

          fmt_path = "/tmp/spdlog/include/spdlog/fmt/bundled/format-inl.h"
          fmt_text = open(fmt_path).read().replace("putc_unlocked", "fputc")
          open(fmt_path, "w").write(fmt_text)

      - name: Compile and Install spdlog
        run: |
          . /etc/profile.d/devkit-env.sh
          export DEVKITPRO=/opt/devkitpro
          cmake -B /tmp/spdlog/build -S /tmp/spdlog \
            -DCMAKE_TOOLCHAIN_FILE=$DEVKITPRO/cmake/Switch.cmake \
            -DCMAKE_INSTALL_PREFIX=$DEVKITPRO/portlibs/switch \
            -DSPDLOG_BUILD_TESTS=OFF -DSPDLOG_BUILD_EXAMPLE=OFF
          cmake --build /tmp/spdlog/build --target install -j$(nproc)

      - name: Configure Switch NRO
        run: |
          . /etc/profile.d/devkit-env.sh
          export DEVKITPRO=/opt/devkitpro

          cat > /tmp/switch-init.cmake << 'CMAKEINIT'
          set(CMAKE_LINK_LIBRARY_USING_WHOLE_ARCHIVE "LINKER:--whole-archive" "<LINK_ITEM>" "LINKER:--no-whole-archive" CACHE STRING "" FORCE)
          set(CMAKE_LINK_LIBRARY_USING_WHOLE_ARCHIVE_SUPPORTED TRUE CACHE BOOL "" FORCE)
          set(CMAKE_C_FLAGS "${CMAKE_C_FLAGS} -Doff64_t=off_t -Dlseek64=lseek -Dstat64=stat -Dfstat64=fstat -DO_LARGEFILE=0 -Wno-error=int-conversion -Wno-error=incompatible-pointer-types -Wno-int-conversion -Wno-incompatible-pointer-types" CACHE STRING "" FORCE)
          set(CMAKE_CXX_FLAGS "${CMAKE_CXX_FLAGS} -Doff64_t=off_t -Dlseek64=lseek -Dstat64=stat -Dfstat64=fstat -DO_LARGEFILE=0 -Wno-error=int-conversion -Wno-error=incompatible-pointer-types -Wno-int-conversion -Wno-incompatible-pointer-types" CACHE STRING "" FORCE)

          if(NOT TARGET ZLIB::ZLIB)
            add_library(ZLIB::ZLIB UNKNOWN IMPORTED GLOBAL)
            set_target_properties(ZLIB::ZLIB PROPERTIES IMPORTED_LOCATION "/opt/devkitpro/portlibs/switch/lib/libz.a" INTERFACE_INCLUDE_DIRECTORIES "/opt/devkitpro/portlibs/switch/include")
          endif()
          CMAKEINIT

          cmake -B build-switch -S . \
            -C /tmp/switch-init.cmake \
            -DCMAKE_TOOLCHAIN_FILE=$DEVKITPRO/cmake/Switch.cmake \
            -DCMAKE_PREFIX_PATH=$DEVKITPRO/portlibs/switch \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DSWITCH=ON \
            -DCMAKE_BUILD_TYPE=Release

      - name: Patch StormLib for Switch BEFORE Compilation
        shell: python
        run: |
          import glob
          patch = (
              "\n#ifdef __SWITCH__\n"
              "#include <sys/types.h>\n"
              "#include <sys/stat.h>\n"
              "#include <fcntl.h>\n"
              "typedef off_t off64_t;\n"
              "#define lseek64 lseek\n"
              "#ifndef O_LARGEFILE\n"
              "#define O_LARGEFILE 0\n"
              "#endif\n"
              "#ifndef stat64\n"
              "#define stat64 stat\n"
              "#endif\n"
              "#ifndef fstat64\n"
              "#define fstat64 fstat\n"
              "#endif\n"
              "#endif\n"
          )
          for f in glob.glob("build-switch/_deps/**/StormPort.h", recursive=True):
              open(f, "a").write(patch)
              print("Patched:", f)

          for f in glob.glob("build-switch/_deps/**/FileStream.cpp", recursive=True):
              c = open(f).read()
              c = c.replace("ftruncate64((intptr_t)pStream->Base.File.hFile, (off64_t)NewFileSize)", "0")
              c = c.replace("ftruncate64", "0 /* ftruncate64 */")
              open(f, "w").write(c)
              print("Patched FileStream:", f)

      - name: Mask all desktop graphics backends (imgui and gfx_opengl) for Switch
        shell: python
        run: |
          import glob
          files = glob.glob("build-switch/_deps/**/imgui_impl_opengl3*", recursive=True) + \
                  glob.glob("build-switch/_deps/**/imgui_impl_sdl2*", recursive=True) + \
                  glob.glob("libultraship/src/fast/backends/gfx_opengl*", recursive=True)
          for f in files:
              open(f, "w").write("#ifndef __SWITCH__\n" + open(f).read() + "\n#endif\n")

      - name: Inject ImGui Desktop Stub Macros into Gui.cpp for Switch
        shell: python
        run: |
          import os
          lines = [
              "#ifndef ImGui_ImplOpenGL3_Init",
              "#define ImGui_ImplOpenGL3_Init(...) (true)",
              "#define ImGui_ImplOpenGL3_Shutdown(...) ((void)0)",
              "#define ImGui_ImplOpenGL3_NewFrame(...) ((void)0)",
              "#define ImGui_ImplOpenGL3_RenderDrawData(...) ((void)0)",
              "#define ImGui_ImplSDL2_InitForOpenGL(...) (true)",
              "#define ImGui_ImplSDL2_Shutdown(...) ((void)0)",
              "#define ImGui_ImplSDL2_NewFrame(...) ((void)0)",
              "#define ImGui_ImplSDL2_ProcessEvent(...) (true)",
              "#endif"
          ]
          stub_header = "\n".join(lines) + "\n"
          for root, dirs, files in os.walk("."):
              for file in files:
                  if file == "Gui.cpp":
                      f = os.path.join(root, file)
                      content = open(f).read()
                      if "#define ImGui_ImplOpenGL3_Init" not in content:
                          open(f, "w").write(stub_header + content)
                          print("Injected stubs into:", f)

      - name: Patch functions.h __assert declaration for Switch
        shell: python
        run: |
          import os
          for root, dirs, files in os.walk("."):
              for file in files:
                  if file == "functions.h":
                      f = os.path.join(root, file)
                      content = open(f).read()
                      patched = content.replace(
                          "#elif defined(__linux__)\nvoid __assert(const char* exp, const char* file, s32 line) __THROW;",
                          "#elif defined(__linux__) && !defined(__aarch64__)\nvoid __assert(const char* exp, const char* file, s32 line) __THROW;"
                      ).replace(
                          "#elif !defined(__APPLE__) && !defined(__SWITCH__) && !defined(__OpenBSD__)\nvoid __assert(const char* exp, const char* file, s32 line);",
                          "#elif !defined(__APPLE__) && !defined(__SWITCH__) && !defined(__OpenBSD__) && !defined(__aarch64__)\nvoid __assert(const char* exp, const char* file, s32 line);"
                      )
                      if patched != content:
                          open(f, "w").write(patched)
                          print("Patched functions.h:", f)
                      else:
                          print("No match found in:", f)

      - name: Patch all ColliderQuadDim member names in soh codebase
        shell: python
        run: |
          import os, re
          for root, dirs, files in os.walk("soh"):
              for f in files:
                  if f.endswith(('.cpp', '.h', '.hpp', '.c')):
                      path = os.path.join(root, f)
                      try:
                          content = open(path).read()
                          patched, count = re.subn(r'(\bdim|\bsrc|\bdest)([\.\->]+)quad\[', r'\1\2quad_t[', content)
                          if count > 0:
                              open(path, "w").write(patched)
                              print(f"Patched {count} instances in {path}")
                      except Exception: pass

      - name: Patch Extract.cpp, imgui.cpp, Fast3dWindow.cpp & pfd for Switch linking
        shell: python
        run: |
          import os, re

          def must_replace(content, old, new, label, count=1):
              actual = content.count(old)
              if actual < count:
                  raise SystemExit(
                      f"\n[PATCH FAILED] {label}\n"
                      f"预期至少匹配 {count} 处，实际匹配到 {actual} 处。\n"
                      f"查找的字符串:\n{old!r}\n"
                  )
              print(f"[PATCH OK] {label}: 匹配到 {actual} 处，已替换")
              return content.replace(old, new)

          def must_sub(content, pattern, repl, label, flags=0):
              new_content, n = re.subn(pattern, repl, content, flags=flags)
              if n == 0:
                  raise SystemExit(f"\n[PATCH FAILED] {label}\n正则未匹配到任何内容:\n{pattern!r}\n")
              print(f"[PATCH OK] {label}: 替换了 {n} 处")
              return new_content

          # 1. pfd header stub
          pfd_path = "soh/soh/Extractor/portable-file-dialogs.h"
          if os.path.exists(pfd_path):
              t = open(pfd_path).read()
              t = must_replace(t, "#elif __EMSCRIPTEN__", "#elif defined(__EMSCRIPTEN__) || defined(__SWITCH__)", "pfd header Switch 保护")
              open(pfd_path, "w").write(t)

          # 2. imgui.cpp POSIX 函数定义与调用点双重保护
          for root, dirs, files in os.walk("."):
              for file in files:
                  if file == "imgui.cpp":
                      f = os.path.join(root, file)
                      c = open(f).read()
                      if "Platform_OpenInShellFn_DefaultImpl_POSIX" in c:
                          c = must_sub(
                              c,
                              r'(static\s+bool\s+Platform_OpenInShellFn_DefaultImpl_POSIX\s*\([^)]*\)\s*\{(?:[^{}]|\{[^{}]*\})*\})',
                              r'#ifndef __SWITCH__\n\1\n#endif',
                              "imgui.cpp POSIX 函数定义保护",
                              flags=re.DOTALL
                          )
                          c = must_sub(
                              c,
                              r'return Platform_OpenInShellFn_DefaultImpl_POSIX\(ctx, path\);',
                              '#ifndef __SWITCH__\n    return Platform_OpenInShellFn_DefaultImpl_POSIX(ctx, path);\n#else\n    (void)ctx; (void)path; return false;\n#endif',
                              "imgui.cpp POSIX 调用点保护"
                          )
                          open(f, "w").write(c)

          # 3. Fast3dWindow.cpp desktop OGL vtable 保护 (兼容 Fast:: 前缀)
          for root, dirs, files in os.walk("."):
              for file in files:
                  if file == "Fast3dWindow.cpp":
                      f = os.path.join(root, file)
                      c = open(f).read()
                      c = must_sub(
                          c,
                          r'new\s+(?:Fast::)?GfxRenderingAPIOGL\s*\(\s*\)',
                          '#if !defined(__SWITCH__)\n    new Fast::GfxRenderingAPIOGL()\n#else\n    nullptr\n#endif',
                          "Fast3dWindow.cpp OGL vtable 保护"
                      )
                      open(f, "w").write(c)

      - name: Redirect libultra types.h directly to devkitPro switch/types.h on Switch
        shell: python
        run: |
          import os
          for root, dirs, files in os.walk("."):
              for f in files:
                  if f == "types.h" and "libultra" in root:
                      p = os.path.join(root, f)
                      try:
                          c = open(p).read()
                          if "#ifdef __SWITCH__\n#include <switch/types.h>\n#else" not in c:
                              c = "#ifdef __SWITCH__\n#include <switch/types.h>\n#else\n" + c + "\n#endif\n"
                              open(p, "w").write(c)
                              print("Redirected:", p)
                      except Exception as e:
                          print("Error redirecting", p, e)

      - name: Patch OTRGlobals.cpp and SohGui.cpp for Switch compile and link
        shell: python
        run: |
          import re

          def must_replace(content, old, new, label, count=1):
              actual = content.count(old)
              if actual < count:
                  raise SystemExit(
                      f"\n[PATCH FAILED] {label}\n"
                      f"预期至少匹配 {count} 处，实际匹配到 {actual} 处。\n"
                      f"查找的字符串:\n{old!r}\n"
                  )
              print(f"[PATCH OK] {label}: 匹配到 {actual} 处，已替换")
              return content.replace(old, new)

          def must_sub(content, pattern, repl, label, flags=0):
              new_content, n = re.subn(pattern, repl, content, flags=flags)
              if n == 0:
                  raise SystemExit(f"\n[PATCH FAILED] {label}\n正则未匹配到任何内容:\n{pattern!r}\n")
              print(f"[PATCH OK] {label}: 替换了 {n} 处")
              return new_content

          f1 = "soh/soh/OTRGlobals.cpp"
          c1 = open(f1).read()
          c1 = must_replace(c1, 'Ship::Switch::Init(Ship::PreInitPhase);',
                             '// Ship::Switch::Init handled by libultraship', "Switch::Init 注释")
          c1 = c1.replace('#include <port/switch/SwitchImpl.h>', '')
          c1 = c1.replace('#include <switch.h>', '')
          c1 = "#ifdef __SWITCH__\n#include <switch.h>\n#endif\n" + c1

          # ShowErrorBox 调用点：用正则容忍参数名/空格差异
          c1 = must_sub(
              c1,
              r'Extractor::ShowErrorBox\([^)]*\);',
              lambda m: f'#ifndef __SWITCH__\n    {m.group(0)}\n#endif',
              "ShowErrorBox 调用点保护"
          )

          # RunExtract 函数体：用正则容忍 char* argv[] / char** argv 两种写法
          c1 = must_sub(
              c1,
              r'void OTRGlobals::RunExtract\(int argc,\s*char\*?\*?\s*argv(?:\[\])?\)\s*\{',
              lambda m: f'#ifndef __SWITCH__\n{m.group(0)}',
              "RunExtract 起始锚点"
          )

          c1 = must_replace(
              c1,
              'void OTRGlobals::Initialize() {',
              '#else\nvoid OTRGlobals::RunExtract(int argc, char* argv[]) {}\n#endif\n\nvoid OTRGlobals::Initialize() {',
              "RunExtract 闭合锚点（Initialize 之前）"
          )

          open(f1, "w").write(c1)

          f2 = "soh/soh/SohGui/SohGui.cpp"
          c2 = open(f2).read()
          c2 = c2.replace('#include <port/switch/SwitchImpl.h>', '')
          c2 = c2.replace('#include <switch.h>', '')
          c2 = "#ifdef __SWITCH__\n#include <switch.h>\n#endif\n" + c2
          open(f2, "w").write(c2)

      - name: Build Switch NRO Binary
        run: |
          . /etc/profile.d/devkit-env.sh
          export DEVKITPRO=/opt/devkitpro
          cmake --build build-switch --target soh -j$(nproc)

      - name: Create Release and Deploy NRO
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: SOH Switch Chinese Release
          files: build-switch/soh/soh.nro
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
