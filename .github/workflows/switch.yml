name: Build Switch CN NRO

on:
  push:
  workflow_dispatch:

jobs:
  build-switch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install devkitPro & Dependencies
        run: |
          sudo mkdir -p /etc/apt/trusted.gpg.d
          sudo curl -L -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64)" -o /etc/apt/trusted.gpg.d/devkitpro.gpg https://apt.devkitpro.org/devkitpro-keyring.gpg
          echo "deb https://apt.devkitpro.org/ stable main" | sudo tee /etc/apt/sources.list.d/devkitpro.list
          sudo apt update
          sudo apt install -y devkitpro-pacman
          sudo dkp-pacman -Syu --noconfirm
          sudo dkp-pacman -S --noconfirm switch-dev switch-sdl2 switch-glad switch-libpng switch-freetype switch-zlib switch-bzip2 switch-curl
      - name: Build Switch NRO
        run: |
          source /etc/profile.d/devkit-env.sh
          $DEVKITPRO/portlibs/switch/bin/dkp-cmake -B build-switch -DSWITCH=ON -DCMAKE_BUILD_TYPE=Release
          cmake --build build-switch --target soh.nro -j$(nproc)
      - name: Upload Switch NRO Artifact
        uses: actions/upload-artifact@v4
        with:
          name: soh-switch-cn
          path: build-switch/soh.nro
