name: Build Switch CN NRO

on:
  push:
  workflow_dispatch:

jobs:
  build-switch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install devkitPro & Switch Dependencies (Official Script)
        run: |
          sudo mkdir -p /usr/local/share/keyrings
          curl -fsSL https://apt.devkitpro.org/devkitpro-pub.gpg | sudo tee /usr/local/share/keyrings/devkitpro-pub.gpg > /dev/null
          echo "deb [trusted=yes] https://apt.devkitpro.org/ stable main" | sudo tee /etc/apt/sources.list.d/devkitpro.list
          sudo apt update
          sudo apt install -y devkitpro-pacman || true
          # 兼容处理 Cloudflare 防刷机制
          sudo sed -i 's/SigLevel.*/SigLevel = Never/g' /opt/devkitpro/pacman/etc/pacman.conf 2>/dev/null || true
          sudo bash -c 'grep -q "XferCommand" /opt/devkitpro/pacman/etc/pacman.conf || echo "XferCommand = /usr/bin/curl -L -A \"Mozilla/5.0\" %u -o %o" >> /opt/devkitpro/pacman/etc/pacman.conf' 2>/dev/null || true
          sudo dkp-pacman -Sy --noconfirm
          sudo dkp-pacman -S --noconfirm switch-dev switch-sdl2 switch-glad switch-libpng switch-freetype switch-zlib switch-bzip2 switch-curl

      - name: Build Switch NRO (Official dkp-cmake Command)
        run: |
          source /etc/profile.d/devkit-env.sh
          # 使用标准的 CMAKE_TOOLCHAIN_FILE 显式开启 -DSWITCH=ON 开关
          cmake -B build-switch -DCMAKE_TOOLCHAIN_FILE=$DEVKITPRO/cmake/Switch.cmake -DSWITCH=ON -DCMAKE_BUILD_TYPE=Release
          cmake --build build-switch --target soh.nro -j$(nproc)

      - name: Upload Switch NRO Artifact
        uses: actions/upload-artifact@v4
        with:
          name: soh-switch-cn
          path: build-switch/soh/soh.nro
