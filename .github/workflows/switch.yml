name: Build Switch CN NRO

on:
  push:
  workflow_dispatch:

jobs:
  build-switch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install devkitPro & Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl libgl1-mesa-dev libglu1-mesa-dev
          curl -L -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64)" -o install-devkitpro-pacman https://apt.devkitpro.org/install-devkitpro-pacman
          chmod +x install-devkitpro-pacman
          sudo ./install-devkitpro-pacman
          export PATH=/opt/devkitpro/pacman/bin:$PATH
          sudo /opt/devkitpro/pacman/bin/dkp-pacman -Syu --noconfirm
          sudo /opt/devkitpro/pacman/bin/dkp-pacman -S --noconfirm switch-dev switch-sdl2 switch-glad switch-libpng switch-freetype switch-zlib switch-bzip2 switch-curl switch-libzip
      - name: Build Switch NRO
        run: |
          export DEVKITPRO=/opt/devkitpro
          export PATH=$DEVKITPRO/pacman/bin:$PATH
          $DEVKITPRO/portlibs/switch/bin/dkp-cmake -B build-switch -DSWITCH=ON -DCMAKE_BUILD_TYPE=Release
          cmake --build build-switch --target soh.nro -j$(nproc)
      - name: Upload Switch NRO Artifact
        uses: actions/upload-artifact@v4
        with:
          name: soh-switch-cn
          path: build-switch/soh.nro
